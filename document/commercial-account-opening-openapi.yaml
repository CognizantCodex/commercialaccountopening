components:
  parameters:
    draft:
      name: draft
      in: query
      required: false
      schema:
        type: string
    tableName:
      name: tableName
      in: query
      required: true
      schema:
        type: string
    entityId:
      name: entityId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    uboId:
      name: uboId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    docId:
      name: docId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    chainId:
      name: chainId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Validation failed or request body was not accepted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InvalidJson:
      description: The API could not parse the JSON request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Invalid JSON payload.
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, service, storage]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: commercial-account-opening-node-api
        storage:
          type: string
          example: sqlite

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        issues:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true
        code:
          type: string

    WorkspaceDraft:
      type: object
      description: Account-opening workspace payload. The frontend owns most nested shape.
      additionalProperties: true

    WorkspaceState:
      allOf:
        - $ref: "#/components/schemas/WorkspaceDraft"
        - type: object
          properties:
            draftId:
              type: string
            lastUpdatedAt:
              type: string
              format: date-time

    DraftSummary:
      type: object
      properties:
        draftId:
          type: string
        entityKey:
          type: string
        entityLabel:
          type: string
        legalName:
          type: string
        taxId:
          type: string
        status:
          type: string
          enum: [draft, submitted]
        updatedAt:
          type: string
        retrievalUrl:
          type: string

    SubmissionSummary:
      allOf:
        - $ref: "#/components/schemas/DraftSummary"
        - type: object
          properties:
            submissionId:
              type: string
            submittedAt:
              type: string
            overallDecision:
              type: string
            kycStatus:
              type: string
            kycSummary:
              type: string
            recommendedAction:
              type: string

    Entity:
      type: object
      required: [entity_id, legal_name, entity_type, jurisdiction, is_listed, status, created_at, updated_at]
      properties:
        entity_id:
          type: string
          format: uuid
        legal_name:
          type: string
        entity_type:
          type: string
        jurisdiction:
          type: string
          minLength: 2
          maxLength: 2
        registration_no:
          type: string
          nullable: true
        tax_id:
          type: string
          nullable: true
        lei_code:
          type: string
          nullable: true
        incorporation_dt:
          type: string
          nullable: true
        is_listed:
          type: boolean
        naics_code:
          type: string
          nullable: true
        risk_rating:
          type: string
          nullable: true
        status:
          type: string
        created_at:
          type: string
        updated_at:
          type: string

    EntityCreateRequest:
      type: object
      required: [legal_name, entity_type, jurisdiction]
      properties:
        legal_name:
          type: string
        entity_type:
          type: string
        jurisdiction:
          type: string
          minLength: 2
          maxLength: 2
        registration_no:
          type: string
          nullable: true
        tax_id:
          type: string
          nullable: true
        lei_code:
          type: string
          nullable: true
        incorporation_dt:
          type: string
          nullable: true
        is_listed:
          type: boolean
        naics_code:
          type: string
          nullable: true
        risk_rating:
          type: string
          nullable: true
        status:
          type: string

    EntityUpdateRequest:
      type: object
      properties:
        legal_name:
          type: string
        entity_type:
          type: string
        jurisdiction:
          type: string
          minLength: 2
          maxLength: 2
        registration_no:
          type: string
          nullable: true
        tax_id:
          type: string
          nullable: true
        lei_code:
          type: string
          nullable: true
        incorporation_dt:
          type: string
          nullable: true
        is_listed:
          type: boolean
        naics_code:
          type: string
          nullable: true
        risk_rating:
          type: string
          nullable: true
        status:
          type: string

    Ubo:
      type: object
      required:
        - ubo_id
        - entity_id
        - first_name
        - last_name
        - date_of_birth
        - nationality
        - country_of_residence
        - id_type
        - id_number
        - ownership_pct
        - screening_status
        - created_at
        - updated_at
      properties:
        ubo_id:
          type: string
          format: uuid
        entity_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
        nationality:
          type: string
        country_of_residence:
          type: string
        id_type:
          type: string
          enum: [PASSPORT, NATIONAL_ID, DRIVERS_LICENSE]
        id_number:
          type: string
        id_expiry_date:
          type: string
          nullable: true
        id_issuing_country:
          type: string
          nullable: true
        ownership_pct:
          type: number
          minimum: 0
          maximum: 100
        control_type:
          type: string
          nullable: true
          enum: [DIRECT_OWNERSHIP, INDIRECT, CONTROL_BY_OTHER_MEANS]
        is_pep:
          type: boolean
        is_sanctioned:
          type: boolean
        is_adverse_media:
          type: boolean
        screening_status:
          type: string
          enum: [PENDING, CLEAR, FLAGGED, ESCALATED]
        last_screened_at:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string

    UboCreateRequest:
      type: object
      required:
        - entity_id
        - first_name
        - last_name
        - date_of_birth
        - nationality
        - country_of_residence
        - id_type
        - id_number
        - ownership_pct
      properties:
        entity_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
        nationality:
          type: string
        country_of_residence:
          type: string
        id_type:
          type: string
          enum: [PASSPORT, NATIONAL_ID, DRIVERS_LICENSE]
        id_number:
          type: string
        id_expiry_date:
          type: string
          nullable: true
        id_issuing_country:
          type: string
          nullable: true
        ownership_pct:
          type: number
          minimum: 0
          maximum: 100
        control_type:
          type: string
          nullable: true
          enum: [DIRECT_OWNERSHIP, INDIRECT, CONTROL_BY_OTHER_MEANS]
        is_pep:
          type: boolean
        is_sanctioned:
          type: boolean
        is_adverse_media:
          type: boolean
        screening_status:
          type: string
          enum: [PENDING, CLEAR, FLAGGED, ESCALATED]
        last_screened_at:
          type: string
          nullable: true

    UboUpdateRequest:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
        nationality:
          type: string
        country_of_residence:
          type: string
        id_type:
          type: string
          enum: [PASSPORT, NATIONAL_ID, DRIVERS_LICENSE]
        id_number:
          type: string
        id_expiry_date:
          type: string
          nullable: true
        id_issuing_country:
          type: string
          nullable: true
        ownership_pct:
          type: number
          minimum: 0
          maximum: 100
        control_type:
          type: string
          nullable: true
          enum: [DIRECT_OWNERSHIP, INDIRECT, CONTROL_BY_OTHER_MEANS]
        is_pep:
          type: boolean
        is_sanctioned:
          type: boolean
        is_adverse_media:
          type: boolean
        screening_status:
          type: string
          enum: [PENDING, CLEAR, FLAGGED, ESCALATED]
        last_screened_at:
          type: string
          nullable: true

    UboDocumentType:
      type: string
      enum: [ID_PROOF, ADDRESS_PROOF, OWNERSHIP_CERT]

    UboDocumentUploadStatus:
      type: string
      enum: [PENDING, VERIFIED, REJECTED]

    UboDocument:
      type: object
      required: [doc_id, ubo_id, doc_type, file_ref, upload_status, created_at]
      properties:
        doc_id:
          type: string
          format: uuid
        ubo_id:
          type: string
          format: uuid
        doc_type:
