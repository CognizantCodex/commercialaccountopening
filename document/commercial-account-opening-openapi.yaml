          maxLength: 64
        upload_status:
          $ref: "#/components/schemas/UboDocumentUploadStatus"
        verified_by:
          type: string
          nullable: true
        verified_at:
          type: string
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true
        created_at:
          type: string

    UboDocumentCreateRequest:
      type: object
      required: [ubo_id, doc_type, file_ref]
      properties:
        ubo_id:
          type: string
          format: uuid
        doc_type:
          $ref: "#/components/schemas/UboDocumentType"
        file_ref:
          type: string
          maxLength: 500
        file_hash:
          type: string
          nullable: true
          minLength: 64
          maxLength: 64
        upload_status:
          $ref: "#/components/schemas/UboDocumentUploadStatus"
        verified_by:
          type: string
          nullable: true
        verified_at:
          type: string
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true

