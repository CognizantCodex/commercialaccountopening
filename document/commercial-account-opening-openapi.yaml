        - chain_id
        - ubo_id
        - parent_entity_id
        - child_entity_id
        - ownership_pct
        - chain_depth
        - created_at
      properties:
        chain_id:
          type: string
          format: uuid
        ubo_id:
          type: string
          format: uuid
