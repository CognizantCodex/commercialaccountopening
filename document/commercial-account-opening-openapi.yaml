      type: object
      additionalProperties: true

    CheckKycContractResponse:
      type: object
      required: [status, message, checkedAt, missingFields]
      properties:
        status:
          type: string
          enum: [pass, fail]
        message:
          type: string
        checkedAt:
          type: string
          format: date-time
        missingFields:
          type: array
          items:
            type: string

    CheckKycApplicationResult:
      type: object
      required: [request, response]
      properties:
        request:
          $ref: "#/components/schemas/CheckKycRequest"
        response:
          type: object
          additionalProperties: true

    CheckKybRequest:
      type: object
      required: [entityName, address, taxId]
      properties:
        entityName:
          type: string
        address:
          type: string
        taxId:
          type: string

    CheckKybResponse:
      type: object
      required:
        - status
        - message
        - entityName
        - addressMatched
        - taxIdMatched
        - checkedAt
        - missingFields
      properties:
        status:
          type: string
          enum: [Pass, Fail]
        message:
          type: string
        entityName:
          type: string
          nullable: true
        addressMatched:
          type: boolean
        taxIdMatched:
          type: boolean
        companyStatus:
          type: string
          nullable: true
        checkedAt:
          type: string
          format: date-time
        missingFields:
          type: array
          items:
            type: string

    CheckRiskResponse:
      type: object
      required: [risk]
      properties:
        risk:
          type: string
          enum: [Low, Moderate, High]

    PlatformSnapshot:
      type: object
      properties:
        clients:
          type: array
          items:
            type: object
            additionalProperties: true
        cases:
          type: array
          items:
            type: object
            additionalProperties: true
        timeline:
          type: array
          items:
            type: object
            additionalProperties: true
        activityFeed:
          type: array
          items:
            type: object
            additionalProperties: true
        alerts:
          type: array
          items:
            type: object
            additionalProperties: true
        decisionLogs:
          type: array
          items:
            type: object
            additionalProperties: true

    TableListResponse:
      type: object
      required: [tables]
      properties:
        tables:
          type: array
          items:
            type: string

    TableSchemaResponse:
      type: object
      additionalProperties: true

    DatabaseInsertRequest:
      type: object
      required: [tableName, values]
      properties:
        tableName:
          type: string
        values:
          type: object
          additionalProperties: true

    DatabaseInsertResponse:
      type: object
      additionalProperties: true
