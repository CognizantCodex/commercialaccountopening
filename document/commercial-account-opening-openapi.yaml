openapi: 3.0.3
info:
  title: Commercial Account Opening Node API
  version: 1.1.0
  description: >
    Swagger/OpenAPI contract for the Node.js API that supports the commercial
    account opening workspace, local screening integrations, direct database
    table helpers, and CRUD APIs for entities, UBOs, UBO documents, and UBO
    ownership chains.
servers:
  - url: http://localhost:8080
    description: Local Node API
tags:
  - name: Health
  - name: Workspace
  - name: Submissions
  - name: Entities
  - name: UBOs
  - name: UBO Documents
  - name: UBO Ownership Chains
  - name: Screening
  - name: Platform
  - name: Database Agents

paths:
  /api/account-opening/health:
    get:
      tags: [Health]
      summary: Check API health
      operationId: getAccountOpeningHealth
      responses:
        "200":
          description: Health status for the Node API.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/account-opening/workspace:
    get:
      tags: [Workspace]
      summary: Load a workspace draft or workspace database metadata
      operationId: getAccountOpeningWorkspace
      parameters:
        - $ref: "#/components/parameters/draft"
        - name: resource
          in: query
          required: false
          schema:
            type: string
            enum: [tables, table-schema]
          description: Optional metadata resource selector.
        - name: tableName
          in: query
          required: false
          schema:
            type: string
          description: Required when resource is table-schema.
      responses:
        "200":
          description: Workspace draft, table list, or table schema.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/WorkspaceState"
                  - $ref: "#/components/schemas/TableListResponse"
                  - $ref: "#/components/schemas/TableSchemaResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Workspace]
      summary: Save a workspace draft or insert a database row through the table agent
      operationId: putAccountOpeningWorkspace
      parameters:
        - $ref: "#/components/parameters/draft"
        - name: resource
          in: query
          required: false
          schema:
            type: string
            enum: [table-insert]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/WorkspaceDraft"
                - $ref: "#/components/schemas/DatabaseInsertRequest"
      responses:
        "200":
          description: Saved workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceState"
        "201":
          description: Row inserted by the database insert agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseInsertResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags: [Workspace]
      summary: Insert a database row through the workspace table agent alias
      operationId: postAccountOpeningWorkspace
      parameters:
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum: [table-insert]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatabaseInsertRequest"
      responses:
        "201":
          description: Row inserted by the database insert agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseInsertResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/account-opening/drafts:
    get:
      tags: [Workspace]
      summary: List saved draft applications
      operationId: listAccountOpeningDrafts
      responses:
        "200":
          description: Saved draft summaries.
          content:
            application/json:
              schema:
                type: object
                required: [drafts]
