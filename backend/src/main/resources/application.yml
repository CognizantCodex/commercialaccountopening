spring:
  application:
    name: kyc-platform-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:kycplatform;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration/kycnorthstar
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  error:
    include-message: always

platform:
  live-mode-default: ${PLATFORM_LIVE_MODE_DEFAULT:true}
